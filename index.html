<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byte Orbit | Reaction Time Tester</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-main: #1a1a1a;
            --text-muted: #6c757d;
            --white: #ffffff;
            --accent: #000000;
            --card-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            
            --game-idle-bg: var(--white);
            --game-idle-icon: var(--accent);
            --game-wait-bg: #ff4d4d; 
            --game-wait-text: var(--white);
            --game-go-bg: #00d26a;   
            --game-go-text: var(--white);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter',sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 0.3rem 3%;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.5px;
            text-decoration: none;
            color: var(--text-main);
        }

        .ByteOrbit{
            font-weight: 900;
            font-family: 'Space Grotesk';
        }
        .logo-icon {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-icon img{
            width: 100%;
        }

        .back-link {
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 24px;
            border: 1px solid #e0e0e0;
            border-radius: 100px;
            transition: var(--transition);
        }

        .back-link:hover {
            background: var(--accent);
            color: var(--white);
            border-color: var(--accent);
            transform: translateY(-1px);
        }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .content-card {
            background: var(--white);
            width: 100%;
            max-width: 700px;
            min-height: 450px; 
            border-radius: 32px;
            box-shadow: var(--card-shadow);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            touch-action: manipulation; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s ease, color 0.2s ease;
            width: 100%;
            height: 100%;
        }

        .game-icon-wrapper {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0.8;
        }

        .game-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .game-subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.4;
        }

        .result-display {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .score-value {
            font-size: 5rem;
            font-weight: 800;
            font-family: 'Space Grotesk', sans-serif;
            line-height: 1;
            letter-spacing: -2px;
        }

        .score-unit {
            font-size: 1.5rem;
            font-weight: 500;
            color: inherit;
            opacity: 0.7;
        }

        .helper-text {
            margin-top: 2rem;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .game-area.state-idle {
            background-color: var(--game-idle-bg);
            color: var(--text-main);
        }
        .game-area.state-idle .game-subtitle { color: var(--text-muted); }

        .game-area.state-waiting {
            background-color: var(--game-wait-bg);
            color: var(--game-wait-text);
            cursor: wait;
        }
        .game-area.state-waiting .game-subtitle { color: rgba(255,255,255, 0.8); }

        .game-area.state-ready {
            background-color: var(--game-go-bg);
            color: var(--game-go-text);
            cursor: pointer;
            transform: scale(1.01);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.1);
        }
        .game-area.state-ready .game-icon-wrapper {
            transform: scale(1.1);
            opacity: 1;
        }

        .game-area.state-fail {
            background-color: var(--game-wait-bg); 
            color: var(--white);
        }

        .game-area.state-result {
            background-color: var(--game-idle-bg);
            color: var(--text-main);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        footer {
            padding: 40px 0;
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .social-link {
            color: #adb5bd;
            font-size: 1.5rem;
            transition: var(--transition);
            text-decoration: none;
        }

        .social-link:hover {
            color: var(--accent);
            transform: scale(1.1);
        }

        @media (max-width: 600px) {
            .content-card {
                border-radius: 24px;
                min-height: 400px;
            }
            .game-title { font-size: 1.5rem; }
            .score-value { font-size: 4rem; }
            .game-area { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <nav class="nav-container">
            <a href="index.html" class="brand">
                <div class="logo-icon">
                    <img src="images/Byte Orbit-2.png" alt="">
                </div>
                <span class="ByteOrbit">ByteOrbit</span>
            </a>
            <a href="index.html" class="back-link">Back</a>
        </nav>
    </header>

    <main>
        <section class="content-card">

            <div id="gameArea" class="game-area state-idle">
                
                <div class="game-icon-wrapper">
                    <i id="gameIcon" class="fa-solid fa-bolt"></i>
                </div>

                <h2 id="gameTitle" class="game-title">Reaction Time</h2>
                
                <p id="gameMessage" class="game-subtitle">
                    Tap anywhere to start the test.
                </p>

                <div id="resultDisplay" class="result-display">
                    <span id="scoreValue" class="score-value">245</span>
                    <span class="score-unit">ms</span>
                </div>

                <div id="helperText" class="helper-text">Tap to try again</div>
            </div>
        
        </section>
    </main>

    <footer>
        <a href="https://www.instagram.com/byte__orbit" target="_blank" class="social-link" aria-label="Instagram">
            <i class="fa-brands fa-instagram"></i>
        </a>
        <a href="https://github.com/Byte0rbit" target="_blank" class="social-link" aria-label="GitHub">
            <i class="fa-brands fa-github"></i>
        </a>
    </footer>

    <script>
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 20) {
                header.style.padding = '0.8rem 5%';
                header.style.borderBottom = '1px solid rgba(0,0,0,0.1)';
            } else {
                header.style.padding = '1.2rem 5%';
                header.style.borderBottom = '1px solid rgba(0,0,0,0.05)';
            }
        });

        const gameArea = document.getElementById('gameArea');
        const gameIcon = document.getElementById('gameIcon');
        const gameTitle = document.getElementById('gameTitle');
        const gameMessage = document.getElementById('gameMessage');
        const resultDisplay = document.getElementById('resultDisplay');
        const scoreValue = document.getElementById('scoreValue');
        const helperText = document.getElementById('helperText');
        let gameState = 'idle'; 
        let signalTime = 0;
        let timerId = null;
        const MIN_DELAY = 2000; 
        const MAX_DELAY = 5000; 

        const ICONS = {
            idle: 'fa-bolt',
            waiting: 'fa-hourglass-half',
            ready: 'fa-hand-pointer',
            fail: 'fa-circle-exclamation',
            result: 'fa-stopwatch'
        };

        gameArea.addEventListener('pointerdown', handleInput);
        function handleInput(e) {

            e.preventDefault();

            switch (gameState) {
                case 'idle':
                case 'result':
                case 'fail':
                    startWaiting();
                    break;
                case 'waiting':
                    triggerFail();
                    break;
                case 'ready':
                    triggerSuccess();
                    break;
            }
        }

        function startWaiting() {
            gameState = 'waiting';

            updateUI('waiting', 'Wait for green...', 'Wait...', ICONS.waiting);
            resultDisplay.style.display = 'none';
            helperText.style.opacity = '0';
            const delay = Math.floor(Math.random() * (MAX_DELAY - MIN_DELAY + 1)) + MIN_DELAY;
            

            timerId = setTimeout(() => {
                setSignal();
            }, delay);
        }

        function setSignal() {
            if (gameState !== 'waiting') return; 

            gameState = 'ready';
            signalTime = performance.now(); 
            updateUI('ready', 'TAP NOW!', 'GO!', ICONS.ready);
        }

        function triggerSuccess() {
            const endTime = performance.now();
            const reactionTime = Math.round(endTime - signalTime);
            
            gameState = 'result';
            updateUI('result', 'Tap to try again', 'Reaction Time', ICONS.result);      
            scoreValue.textContent = reactionTime;
            resultDisplay.style.display = 'flex';
            helperText.style.opacity = '1';
        }

        function triggerFail() {
            clearTimeout(timerId);
            gameState = 'fail';
            updateUI('fail', 'Too soon! Tap to retry.', 'Whoops!', ICONS.fail);
            resultDisplay.style.display = 'none';
            helperText.style.opacity = '1';
        }

        function updateUI(state, msg, title, iconClass) {
            gameArea.className = `game-area state-${state}`;
            gameMessage.textContent = msg;
            gameTitle.textContent = title;
            gameIcon.className = `fa-solid ${iconClass}`;
        }
    </script>
</body>
</html>
